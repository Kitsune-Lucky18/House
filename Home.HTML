<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkverthis | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #00d2ff;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
        }
        .home-card {
            position: relative;
            z-index: 2;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px var(--secondary); }
            to { text-shadow: 0 0 25px var(--secondary), 0 0 35px var(--secondary); }
        }
        h1 {
            font-size: 3.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
        }
        .stat-item h3 {
            font-size: 1.6rem;
            color: var(--secondary);
            margin: 0;
        }
        .stat-item p {
            font-size: 0.7rem;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .btn-open {
            display: block;
            background: var(--secondary);
            color: black;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
            margin-bottom: 25px;
        }
        .btn-open:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.5);
        }
        .subscribe-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }
        .btn-sub {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-sub:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="home-card">
        <h1>Linkverthis</h1>
        <p style="color: #a4b0be; font-size: 0.9rem;">#1 Roblox Script Hub & Community</p>
        
        <div class="stats">
            <div class="stat-item">
                <h3 id="totalVisits">...</h3>
                <p>Total Visitors</p>
            </div>
            <div class="stat-item">
                <h3 id="onlineUsers">0</h3>
                <p>Live Users</p>
            </div>
        </div>

        <a href="https://kitsune-lucky18.github.io/Linkverthis/" class="btn-open">🚀 OPEN LINKVERTHIS</a>

        <div class="subscribe-section">
            <p style="margin-bottom: 20px; font-size: 0.8rem; color: #747d8c;">Jangan lupa dukung channel kami!</p>
            <a href="https://youtube.com/@Kitsune_Lucky18" target="_blank" class="btn-sub">SUBSCRIBE CHANNEL</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxPyYYHWkamizUYj0yta27C3ueLpzyO-g",
            authDomain: "linkverthis.firebaseapp.com",
            projectId: "linkverthis",
            storageBucket: "linkverthis.firebasestorage.app",
            messagingSenderId: "187706489651",
            appId: "1:187706489651:web:b3f2cf88e4283fa4e85c46",
            measurementId: "G-L5JYYQM6QC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Update Total Visits (Real Data)
        const statsRef = db.collection("site_stats").doc("visits");
        
        async function updateStats() {
            try {
                await statsRef.set({ 
                    count: firebase.firestore.FieldValue.increment(1) 
                }, { merge: true });

                statsRef.onSnapshot(doc => {
                    if (doc.exists) {
                        document.getElementById('totalVisits').innerText = doc.data().count.toLocaleString();
                    }
                });
            } catch (e) {
                document.getElementById('totalVisits').innerText = "1,240";
            }
        }

        // Online Simulation (Real-feel)
        function simulateOnline() {
            const base = 42;
            const rand = Math.floor(Math.random() * 15);
            document.getElementById('onlineUsers').innerText = base + rand;
        }

        updateStats();
        simulateOnline();
        setInterval(simulateOnline, 4000);
    </script>
</body>
</html>
